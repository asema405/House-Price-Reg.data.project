<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: white; }
        .container { margin-top: 50px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; }
        input { background: #222 !important; color: white !important; border: 1px solid #444 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2>House Price Prediction</h2>
        <div class="row">
            <div class="col-md-6">
                <form method="POST">
                    {% for f in features %}
                    <div class="mb-2">
                        <label>{{ f }}</label>
                        <input type="text" name="{{ f }}" class="form-control" required>
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary mt-3">Predict</button>
                </form>
                {% if prediction %}
                <h3 class="mt-4 text-success">Result: {{ prediction }}</h3>
                {% endif %}
            </div>
            <div class="col-md-6">
                <h4>Model Performance</h4>
                <img src="/static/plot.png" class="img-fluid rounded">
            </div>
        </div>
        <hr>
        <h4>Dataset Samples (Top 10)</h4>
        <div class="table-responsive text-white">
            {{ table | safe }}
        </div>
    </div>
</body>
</html>
